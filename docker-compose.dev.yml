services:
  mysql_auth:
    image: mysql:8.0
    container_name: mysql_auth
    volumes:
      - ./data/mysql_auth:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_kho:
    image: mysql:8.0
    container_name: mysql_kho
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql_kho:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kho_db
    ports: ["3308:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_kho:
    image: redis:7.2
    container_name: redis_kho
    volumes:
      - ./data/redis_kho:/data
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    volumes:
      - ./data/zookeeper_data:/var/lib/zookeeper/data
      - ./data/zookeeper_log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 8

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    stop_grace_period: 30s
    volumes:
      - ./data/kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 6000
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    image: project_1-auth-service:dev
    container_name: auth-service
    build:
      context: ./Auth_Service
      dockerfile: Dockerfile.dev
    command: mvn -Dspring-boot.run.fork=false spring-boot:run
    ports:
      - "8080:8080"
    volumes:
      - ./Auth_Service:/app
      - maven_repo:/root/.m2
    depends_on:
      mysql_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_auth:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  notification-service:
    image: project_1-notification-service:dev
    container_name: notification-service
    build:
      context: ./Notification_Service
      dockerfile: Dockerfile.dev
    command: mvn -Dspring-boot.run.fork=false spring-boot:run
    volumes:
      - ./Notification_Service:/app
      - maven_repo:/root/.m2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  service_kho-springboot:
    image: project_1-service-kho-springboot:dev
    container_name: service_kho
    build:
      context: ./service_kho-springboot
      dockerfile: Dockerfile.dev
    command: mvn -Dspring-boot.run.fork=false spring-boot:run
    ports:
      - "3002:8080"
    volumes:
      - ./service_kho-springboot:/app
      - maven_repo:/root/.m2
    depends_on:
      mysql_kho:
        condition: service_healthy
      redis_kho:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_kho:3306/kho_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      REDIS_HOST: redis_kho
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports: ["3000:3000"]
    depends_on:
      - auth-service
      - service_kho-springboot

volumes:
  maven_repo:
