services:
  # --- HẠ TẦNG (INFRASTRUCTURE) ---
  mysql_auth:
    image: mysql:8.0
    volumes:
      - ./data/mysql_auth:/var/lib/mysql # Mount dữ liệu DB Auth ra ngoài
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_kho:
    image: mysql:8.0    
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql_kho:/var/lib/mysql # Mount dữ liệu DB Kho ra ngoài
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kho_db
    ports: ["3308:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_kho:
    image: redis:7.2
    volumes:
      - ./data/redis_kho:/data # Mount dữ liệu Redis ra ngoài
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    volumes:
      - ./data/zookeeper_data:/var/lib/zookeeper/data # Lưu trạng thái Zookeeper
      - ./data/zookeeper_log:/var/lib/zookeeper/log # Lưu log Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    volumes:
      - ./data/kafka_data:/var/lib/kafka/data # Lưu trữ các Topic và Message Kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- DỊCH VỤ (MICROSERVICES) ---
  auth-service:
    build: ./Auth_Service
    ports:
      - "8080:8080"
    depends_on:
      mysql_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_auth:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    build: ./Notification_Service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  kho-service:
    build: ./Service_kho
    volumes:
      - ./Service_kho:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    depends_on:
      mysql_kho:
        condition: service_healthy
      redis_kho:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: mysql_kho
      DB_USER: root
      DB_PASS: root
      DB_NAME: kho_db
      REDIS_HOST: redis_kho
      KAFKA_HOST: kafka:9092

  frontend:
    build: ./Frontend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    ports: ["3000:3000"]
    depends_on:
      - auth-service
      - kho-service
