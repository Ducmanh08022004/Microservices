server:
  port: 8085

app:
  jwt-secret: ${JWT_SECRET:project_microservices_myscret_token_token_1234567789}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**

        - id: inventory-service
          uri: http://inventory-service:8080
          predicates:
            - Path=/api/products/**,/admin/products/**

        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/api/orders/**
