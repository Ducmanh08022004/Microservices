services:
  # --- HẠ TẦNG  ---
  mysql_auth:
    image: mysql:8.0
    container_name: mysql_auth
    volumes:
      - ./data/mysql_auth:/var/lib/mysql  # Mount dữ liệu DB Auth ra ngoài
      - ./init/auth:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_kho:
    image: mysql:8.0   
    container_name: mysql_inventory 
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql_kho:/var/lib/mysql # Mount dữ liệu DB Kho ra ngoài
      - ./init/inventory:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kho_db
    ports: ["3308:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_order:
    image: mysql:8.0
    container_name: mysql_order
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql_order:/var/lib/mysql # Mount dữ liệu DB Order ra ngoài
      - ./init/order:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    ports: ["3309:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_kho:
    image: redis:7.2
    container_name: redis_inventory
    volumes:
      - ./data/redis_kho:/data # Mount dữ liệu Redis ra ngoài
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    volumes:
      - ./data/zookeeper_data:/var/lib/zookeeper/data # Lưu trạng thái Zookeeper
      - ./data/zookeeper_log:/var/lib/zookeeper/log # Lưu log Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    volumes:
      - ./data/kafka_data:/var/lib/kafka/data # Lưu trữ các Topic và Message Kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- DỊCH VỤ ---
  auth-service:
    image: microservices/auth-service:dev
    container_name: auth_service
    build:
      context: ./Auth_Service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      mysql_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_auth:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    image: microservices/notification-service:dev
    container_name: notification_service
    build:
      context: ./Notification_Service
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  inventory-service:
    image: microservices/inventory-service:dev
    container_name: inventory_service
    build:
      context: ./Inventory_Service
      dockerfile: Dockerfile
    ports:
      - "3002:8080"
    depends_on:
      mysql_kho:
        condition: service_healthy
      redis_kho:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_kho:3306/kho_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      REDIS_HOST: redis_kho
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  order-service:
    image: microservices/order-service:dev
    container_name: order_service
    build:
      context: ./Order_Service
      dockerfile: Dockerfile
    ports:
      - "3003:8081"
    depends_on:
      mysql_order:
        condition: service_healthy
      inventory-service:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_order:3306/order_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      INVENTORY_BASE_URL: http://inventory-service:8080
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  api-gateway:
    image: microservices/api-gateway:dev
    container_name: api_gateway
    build:
      context: ./Gateway_Service
      dockerfile: Dockerfile
    ports:
      - "3001:8085"
    depends_on:
      auth-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
    environment:
      JWT_SECRET: project_microservices_myscret_token_token_1234567789

  frontend:
    image: microservices/frontend:dev
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_GATEWAY_URL: http://localhost:3001
    ports: ["3000:3000"]
    depends_on:
      - api-gateway

volumes:
  maven_repo:
